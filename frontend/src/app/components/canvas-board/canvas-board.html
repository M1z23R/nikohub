<div #board class="board"
  [class.panning]="panning()"
  (contextmenu)="onBackgroundContextMenu($event)"
  (pointerdown)="onBoardPointerDown($event)"
  (wheel)="onWheel($event)"
  (click)="closeMenu()">
  <div class="sheet" [style.transform]="'translate(' + panX() + 'px,' + panY() + 'px) scale(' + scale() + ')'"
    style="transform-origin: 0 0">
    @for (c of list(); track c.id) {
      <app-card
        [card]="c"
        (changed)="replaceLocally($event)"
        (contextRequested)="onCardContextRequested($event)"
        (click)="bringToFront(c)"
      />
    }
  </div>
  @for (ind of indicators(); track $index) {
    <div class="indicator"
      [style.left.px]="ind.x"
      [style.top.px]="ind.y"
      [style.background]="ind.color"
    ></div>
  }
</div>

@if (menu(); as m) {
  <div class="menu" [style.left.px]="m.x" [style.top.px]="m.y" (click)="$event.stopPropagation()">
    @if (m.kind === 'empty') {
      <div class="label">New note</div>
      <div class="swatches">
        @for (color of colors; track color) {
          <button class="swatch" [style.background]="color" (click)="createAt(color)"></button>
        }
      </div>
    } @else {
      <div class="label">Color</div>
      <div class="swatches">
        @for (color of colors; track color) {
          <button class="swatch" [style.background]="color" (click)="changeCardColor(color)"></button>
        }
      </div>
      <button class="item" (click)="triggerUpload()">Upload image</button>
      <input #fi type="file" accept="image/*" (change)="uploadImage($event)" style="display:none" />
      @if (m.card.has_image) {
        <button class="item" (click)="removeImage()">Remove image</button>
      }
      <button class="item danger" (click)="deleteCard()">Delete</button>
    }
  </div>
}
