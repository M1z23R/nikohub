<div class="ws-sidebar">
  @for (w of list(); track w.id ?? 'personal') {
    <div class="ws-row" [class.active]="activeId() === w.id">
      <button class="ws-name-btn" (click)="select(w)">{{ w.name }}</button>
      @if (w.id) {
        <ui-dropdown position="bottom-end">
          <ui-button
            uiDropdownTrigger
            variant="ghost"
            size="sm"
            aria-label="Workspace actions">⋯</ui-button>
          @if (w.role === 'owner') {
            <ui-dropdown-item (clicked)="openSettings(w)">Settings</ui-dropdown-item>
          } @else {
            <ui-dropdown-item (clicked)="leave(w)">Leave</ui-dropdown-item>
          }
        </ui-dropdown>
      }
    </div>
  }
  <ui-button variant="outline" size="sm" (clicked)="openNewOrJoin()">New / Join</ui-button>
</div>
