<ui-modal title="Workspaces" size="sm">
  <div class="ws-section">
    <div class="ws-heading">New workspace</div>
    <ui-input
      placeholder="Workspace name"
      [(value)]="name"
      (keydown.enter)="create()" />
    <ui-button size="sm" [disabled]="!name().trim() || busy()" (clicked)="create()">Create</ui-button>
  </div>

  <hr class="ws-divider" />

  <div class="ws-section">
    <div class="ws-heading">Or join with a code</div>
    <ui-input
      placeholder="Invite code"
      [(value)]="code"
      (keydown.enter)="join()" />
    <ui-button size="sm" [disabled]="!code().trim() || busy()" (clicked)="join()">Join</ui-button>
  </div>

  @if (error()) {
    <ui-alert variant="danger">{{ error() }}</ui-alert>
  }

  <div footer>
    <ui-button variant="ghost" size="sm" (clicked)="dismiss()">Close</ui-button>
  </div>
</ui-modal>
